set -g prefix C-a
# Ctrl-\ is a fallback prefix target for Korean IME via Karabiner.
# Avoid F12 because macOS treats it as Volume Up on Apple keyboards, and
# avoid Ctrl+letter because Ghostty/macOS CJK IME can swallow it.
set -g prefix2 'C-\'
unbind C-b

# Pi: preserve modified keys such as Shift+Enter / Ctrl+Enter / Alt+Enter in tmux.
# Requires tmux 3.2+ and a terminal with extended-key support (Ghostty supports this).
set -g extended-keys on
set -g extended-keys-format csi-u

# Status bar widths (defaults 10/40 are too short — truncates session/host names)
set -g status-left-length 40
set -g status-right-length 80

# Theme: auto-detect macOS appearance on startup (defaults to light if non-macOS)
if-shell "defaults read -g AppleInterfaceStyle 2>/dev/null | grep -q Dark" \
  "set -g @theme dark ; source-file $HOME/.config/tmux/theme-dark.conf" \
  "set -g @theme light ; source-file $HOME/.config/tmux/theme-light.conf"

# Toggle theme: prefix + T
bind T if-shell -F '#{==:#{@theme},dark}' \
  "set -g @theme light ; source-file $HOME/.config/tmux/theme-light.conf ; display-message 'Theme: light'" \
  "set -g @theme dark ; source-file $HOME/.config/tmux/theme-dark.conf ; display-message 'Theme: dark'"
# Korean 2-set IME alias: physical Shift+t -> ㅆ
bind ㅆ if-shell -F '#{==:#{@theme},dark}' \
  "set -g @theme light ; source-file $HOME/.config/tmux/theme-light.conf ; display-message 'Theme: light'" \
  "set -g @theme dark ; source-file $HOME/.config/tmux/theme-dark.conf ; display-message 'Theme: dark'"

# Mouse support
set -g mouse on

# Let terminal apps such as Yazi pass terminal queries through tmux.
# Required for DA/DSR-based feature detection in tmux popups.
set -g allow-passthrough all
set -g update-environment "DISPLAY KRB5CCNAME MSYSTEM SSH_ASKPASS SSH_AUTH_SOCK SSH_AGENT_PID SSH_CONNECTION WINDOWID XAUTHORITY TERM TERM_PROGRAM"

# tmux-sessionizer: quick project session switcher (prefix + f)
bind-key -r f run-shell "tmux neww tmux-sessionizer"
# Korean 2-set IME aliases: physical f -> ㄹ, physical s -> ㄴ
bind-key -r ㄹ run-shell "tmux neww tmux-sessionizer"
# Mirror sessionx onto the Hangul key so IME state does not lose the binding.
bind-key ㄴ run-shell "$HOME/.tmux/plugins/tmux-sessionx/scripts/sessionx.sh"
# Karabiner Korean-prefix mode sends control punctuation to bypass IME composition.
bind-key -r C-_ run-shell "tmux neww tmux-sessionizer"
bind-key -r C-/ run-shell "tmux neww tmux-sessionizer"
# Karabiner Korean-prefix mode rewrites Hangul `ㄴ` (physical `s`) to `C-]`,
# so this binding is the actual entry point for `<C-a>s` while the Hangul IME
# is active. Keep it pointed at sessionx for a consistent experience.
bind-key C-] run-shell "$HOME/.tmux/plugins/tmux-sessionx/scripts/sessionx.sh"

# Intuitive split keys, inheriting current directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# New window also inherits current directory (override default `c`)
bind c new-window -c "#{pane_current_path}"
# Korean 2-set IME alias: physical c -> ㅊ
bind ㅊ new-window -c "#{pane_current_path}"

# Vim-style pane navigation (overrides `l` = last-window — moved to Tab below)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
# Korean 2-set IME aliases: physical h/j/k/l -> ㅗ/ㅓ/ㅏ/ㅣ
bind ㅗ select-pane -L
bind ㅓ select-pane -D
bind ㅏ select-pane -U
bind ㅣ select-pane -R

# Preserve last-window toggle on Tab (since `l` is now pane-right)
bind Tab last-window

# Terminal IDE helpers
# prefix + D: ensure agent/files windows in the current tmux session
bind D run-shell "$HOME/.local/bin/dev-session --current-session \"#{pane_current_path}\""
# Korean 2-set IME alias: physical Shift+d -> ㅇ
bind ㅇ run-shell "$HOME/.local/bin/dev-session --current-session \"#{pane_current_path}\""
# prefix + g/y: open Git or file manager in a tmux popup without disturbing layout
bind g display-popup -d "#{pane_current_path}" -w 90% -h 90% -T "lazygit" -E "$SHELL -lc 'exec lazygit'"
bind y display-popup -d "#{pane_current_path}" -w 95% -h 95% -T "yazi" -E "tmux new-session yazi \; set status off"
# Korean 2-set IME aliases: physical g/y -> ㅎ/ㅛ
bind ㅎ display-popup -d "#{pane_current_path}" -w 90% -h 90% -T "lazygit" -E "$SHELL -lc 'exec lazygit'"
bind ㅛ display-popup -d "#{pane_current_path}" -w 95% -h 95% -T "yazi" -E "tmux new-session yazi \; set status off"
# prefix + r: reload this config quickly while iterating
bind r source-file "$HOME/.config/tmux/tmux.conf" \; display-message "tmux config reloaded"
# Korean 2-set IME alias: physical r -> ㄱ
bind ㄱ source-file "$HOME/.config/tmux/tmux.conf" \; display-message "tmux config reloaded"

# === Plugins (TPM) ===========================================================
# Plugins are cloned under ~/.tmux/plugins via TPM. Install with `prefix + I` or
# by running ~/.tmux/plugins/tpm/bin/install_plugins from the shell.
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'omerxx/tmux-sessionx'

# tmux-sessionx: fzf-based session picker with inline create / kill / rename,
# live preview, and zoxide-powered directory jump.
# Override the default `prefix + s` (choose-tree) with sessionx; `prefix + C-]`
# is preserved above as a built-in fallback.
set -g @sessionx-bind 's'
set -g @sessionx-zoxide-mode 'on'
set -g @sessionx-window-mode 'on'
set -g @sessionx-preview-enabled 'true'

# === Session bootstrap hook ==================================================
# Auto-add `agent` (pi CLI) and `files` (nvim) windows to newly created
# sessions whose path is a git repo. Sessions with deny-listed names
# (e.g. `_config`, `tmp_*`) are skipped. Implementation is in
# ~/.local/bin/tmux-session-bootstrap.
# NOTE: #{session_id} expands empty inside session-created — use #S instead.
set-hook -g session-created 'run-shell -b "$HOME/.local/bin/tmux-session-bootstrap #S"'

# Keep this `run` line at the very bottom — TPM requires it last.
run '~/.tmux/plugins/tpm/tpm'
